<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>n-Johari Window — NCS</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Inter+Tight:wght@500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    /* NCS brand */
    --ncs-blue:#00A7E1;
    --ncs-blue-2:#0089BC;
    --ncs-blue-tint:#E6F7FD;
    --ncs-blue-tint-2:#CCEEFA;
    --ink:#0A1628;
    --ink-2:#4A5C72;
    --ink-3:#8A98AB;
    --line:#E1E8F0;
    --line-2:#CFD9E5;
    --surface:#FFFFFF;
    --surface-2:#F5F8FC;
    --surface-3:#EEF3F9;
    /* pane accents */
    --c-arena:#00A7E1;     --c-arena-bg:#E6F7FD;
    --c-blind:#1F4E7A;     --c-blind-bg:#E1ECF5;
    --c-facade:#C2761A;    --c-facade-bg:#FAEFDC;
    --c-unknown:#5B6B7E;   --c-unknown-bg:#EEF1F4;
    --radius:14px;
    --radius-sm:8px;
    --shadow:0 24px 60px -28px rgba(10,22,40,.30);
    --shadow-sm:0 4px 14px -6px rgba(10,22,40,.18);
    --shadow-blue:0 14px 30px -14px rgba(0,167,225,.45);
    --display:"Inter Tight","Inter",system-ui,sans-serif;
    --sans:"Inter",system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--sans);color:var(--ink);
    background:#fff;
    -webkit-font-smoothing:antialiased;line-height:1.55;min-height:100%;
    background-image:
      radial-gradient(60% 50% at 90% -10%, rgba(0,167,225,.10), rgba(0,167,225,0) 70%),
      radial-gradient(40% 40% at -5% 20%, rgba(0,167,225,.06), rgba(0,167,225,0) 70%);
    background-attachment:fixed;
  }
  #app{position:relative;z-index:2;max-width:920px;margin:0 auto;padding:clamp(20px,5vw,48px) clamp(18px,4vw,36px) 80px}

  .screen{animation:fade .5s cubic-bezier(.2,.7,.2,1) both}
  @keyframes fade{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  .stagger>*{animation:fade .5s cubic-bezier(.2,.7,.2,1) both}
  .stagger>*:nth-child(1){animation-delay:.04s}
  .stagger>*:nth-child(2){animation-delay:.12s}
  .stagger>*:nth-child(3){animation-delay:.20s}
  .stagger>*:nth-child(4){animation-delay:.28s}
  .stagger>*:nth-child(5){animation-delay:.36s}

  /* ---- typography ---- */
  .eyebrow{
    font-family:var(--sans);font-weight:700;font-size:.74rem;letter-spacing:.18em;
    text-transform:uppercase;color:var(--ncs-blue);
  }
  h1{
    font-family:var(--display);font-weight:700;letter-spacing:-.025em;
    font-size:clamp(2.4rem,6vw,3.6rem);line-height:1.04;margin:.32em 0 .42em;
    color:var(--ink);
  }
  h1 em{font-style:normal;color:var(--ncs-blue)}
  h2{
    font-family:var(--display);font-weight:700;font-size:clamp(1.55rem,3.6vw,2.1rem);
    line-height:1.15;letter-spacing:-.02em;margin-bottom:.3em;color:var(--ink);
  }
  h3{font-family:var(--display);font-weight:600;font-size:1.2rem;letter-spacing:-.012em}
  .lede{font-size:clamp(1rem,2vw,1.1rem);color:var(--ink-2);max-width:58ch;line-height:1.6}
  p.small{font-size:.92rem;color:var(--ink-2)}

  /* ---- buttons ---- */
  .btn{
    font-family:var(--sans);font-weight:600;font-size:.96rem;
    padding:.78rem 1.4rem;border-radius:10px;border:1.5px solid var(--ncs-blue);
    background:var(--ncs-blue);color:#fff;cursor:pointer;
    transition:transform .12s ease, box-shadow .2s ease, background .2s, border-color .2s;
    box-shadow:var(--shadow-blue);letter-spacing:-.005em;
  }
  .btn:hover{transform:translateY(-2px);background:var(--ncs-blue-2);border-color:var(--ncs-blue-2)}
  .btn:active{transform:translateY(0)}
  .btn:disabled{opacity:.36;cursor:not-allowed;transform:none;box-shadow:none}
  .btn.ghost{background:transparent;color:var(--ink);border-color:var(--line-2);box-shadow:none}
  .btn.ghost:hover{background:var(--surface-2);border-color:var(--ink-3);color:var(--ink)}
  .btn.dark{background:var(--ink);border-color:var(--ink);box-shadow:0 14px 30px -16px rgba(10,22,40,.55)}
  .btn.dark:hover{background:#000;border-color:#000}
  .btn.sm{font-size:.84rem;padding:.5rem .95rem;border-radius:8px}
  .linkbtn{
    background:none;border:none;font-family:var(--sans);font-weight:600;
    color:var(--ncs-blue);cursor:pointer;font-size:.95rem;
    padding:.1em 0;display:inline-flex;align-items:center;gap:.3rem;
  }
  .linkbtn::after{content:"\2192";font-weight:700;transition:transform .2s}
  .linkbtn:hover{color:var(--ncs-blue-2)}
  .linkbtn:hover::after{transform:translateX(3px)}
  .row{display:flex;gap:.7rem;flex-wrap:wrap;align-items:center}
  .row.end{justify-content:flex-end}

  /* ---- topbar ---- */
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:36px;padding-bottom:18px;border-bottom:1px solid var(--line)}
  .mark{
    font-family:var(--display);font-weight:700;font-size:1.05rem;letter-spacing:-.015em;
    cursor:pointer;background:none;border:none;color:var(--ink);padding:0;
  }
  .topbar .byNCS{
    font-family:var(--sans);font-size:.74rem;font-weight:700;letter-spacing:.2em;
    text-transform:uppercase;color:var(--ink-3);
  }

  /* ---- cards / panels ---- */
  .panel{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:clamp(20px,3.5vw,30px);box-shadow:var(--shadow-sm);
  }
  .choose-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:28px}
  @media(max-width:560px){.choose-grid{grid-template-columns:1fr}}
  .choice{
    text-align:left;cursor:pointer;border:1px solid var(--line);
    background:var(--surface);border-radius:var(--radius);padding:24px;
    transition:transform .14s ease, border-color .2s, box-shadow .2s, background .2s;
    box-shadow:var(--shadow-sm);font-family:var(--sans);color:var(--ink);position:relative;overflow:hidden;
  }
  .choice::after{
    content:"\2192";position:absolute;right:20px;top:22px;
    color:var(--ncs-blue);font-weight:700;font-family:var(--display);
    font-size:1.25rem;opacity:.55;
    transition:transform .25s ease, opacity .2s;
  }
  .choice:hover{transform:translateY(-3px);border-color:var(--ncs-blue);box-shadow:var(--shadow);background:#fff}
  .choice:hover::after{transform:translateX(4px);opacity:1}
  .choice .ic{font-family:var(--display);font-size:.78rem;color:var(--ncs-blue);margin-bottom:.6rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase}
  .choice strong{display:block;font-size:1.1rem;font-weight:700;margin-bottom:.25rem;letter-spacing:-.012em}
  .choice span{font-size:.92rem;color:var(--ink-2);line-height:1.5;display:block;padding-right:30px}

  /* ---- form ---- */
  label.fld{display:block;font-weight:600;font-size:.88rem;margin-bottom:.5rem;color:var(--ink)}
  input[type=text]{
    width:100%;font-family:var(--sans);font-size:1.02rem;color:var(--ink);
    padding:.78rem 1rem;border:1.5px solid var(--line-2);border-radius:10px;
    background:var(--surface-2);outline:none;transition:border-color .2s, background .2s, box-shadow .2s;
  }
  input[type=text]:focus{border-color:var(--ncs-blue);background:#fff;box-shadow:0 0 0 3px rgba(0,167,225,.18)}
  input.code{text-transform:uppercase;letter-spacing:.3em;font-weight:700;font-size:1.3rem;text-align:center;font-family:var(--display)}

  .steps{display:flex;gap:.4rem;align-items:center;font-size:.76rem;color:var(--ink-3);
    font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.45rem}
  .steps b{color:var(--ncs-blue)}

  /* ---- trait chips ---- */
  .chipwrap{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
  .chip{
    font-family:var(--sans);font-size:.9rem;font-weight:500;
    padding:.48rem .85rem;border-radius:8px;border:1.5px solid var(--line-2);
    background:#fff;color:var(--ink);cursor:pointer;
    transition:transform .12s ease, background .15s, color .15s, border-color .15s, box-shadow .15s;
    letter-spacing:-.005em;
  }
  .chip:hover{border-color:var(--ink-3)}
  .chip.on{background:var(--ncs-blue);color:#fff;border-color:var(--ncs-blue);transform:scale(1.04);
    box-shadow:0 6px 14px -6px rgba(0,167,225,.55)}
  .chip:disabled{opacity:.4;cursor:not-allowed}

  .selbar{
    position:sticky;bottom:14px;margin-top:26px;
    background:var(--ink);color:#fff;border:1px solid var(--ink);border-radius:12px;
    padding:.7rem .8rem .7rem 1.3rem;display:flex;align-items:center;
    justify-content:space-between;gap:1rem;box-shadow:var(--shadow);
  }
  .selbar .count{font-weight:600;font-size:.95rem;color:#fff}
  .selbar .count b{font-family:var(--display);font-size:1.25rem;color:var(--ncs-blue);margin-right:.1rem}
  .selbar .hint{color:rgba(255,255,255,.7);font-weight:500;font-size:.86rem}
  .selbar .btn{background:#fff;color:var(--ink);border-color:#fff;box-shadow:none}
  .selbar .btn:hover{background:var(--ncs-blue);color:#fff;border-color:var(--ncs-blue)}
  .selbar .btn:disabled{background:rgba(255,255,255,.2);color:rgba(255,255,255,.5);border-color:transparent}
  .selbar.flash{animation:shake .4s}
  @keyframes shake{0%,100%{transform:none}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

  /* ---- the window ---- */
  .winstage{margin:30px auto 0;max-width:680px}
  .axis-top{display:grid;grid-template-columns:1fr 1fr;margin-left:118px;gap:14px;
    text-align:center;font-size:.72rem;font-weight:700;letter-spacing:.12em;
    text-transform:uppercase;color:var(--ink-3);margin-bottom:10px}
  .winrow{display:flex;align-items:stretch}
  .axis-left{width:104px;display:flex;flex-direction:column;gap:14px;padding-top:14px}
  .axis-left>div{flex:1;display:flex;align-items:center;justify-content:center;
    text-align:center;font-size:.72rem;font-weight:700;letter-spacing:.12em;
    text-transform:uppercase;color:var(--ink-3);writing-mode:vertical-rl;transform:rotate(180deg)}
  .window{
    flex:1;background:var(--ink);padding:14px;display:grid;
    grid-template-columns:1fr 1fr;gap:14px;border-radius:14px;
    box-shadow:var(--shadow), inset 0 0 0 1px rgba(0,167,225,.18);
    position:relative;
  }
  .window::before{
    content:"";position:absolute;top:-1px;left:18px;right:18px;height:2px;
    background:linear-gradient(90deg,transparent,var(--ncs-blue),transparent);
    border-radius:2px;opacity:.7;
  }
  .pane{
    border-radius:10px;padding:16px 16px 18px;min-height:200px;
    position:relative;overflow:hidden;background:#fff;
  }
  .pane.arena{background:var(--c-arena-bg)}
  .pane.blind{background:var(--c-blind-bg)}
  .pane.facade{background:var(--c-facade-bg)}
  .pane.unknown{background:var(--c-unknown-bg)}
  .pane .pname{font-family:var(--display);font-size:1.15rem;font-weight:700;line-height:1;letter-spacing:-.015em}
  .pane.arena .pname{color:var(--c-arena)}
  .pane.blind .pname{color:var(--c-blind)}
  .pane.facade .pname{color:var(--c-facade)}
  .pane.unknown .pname{color:var(--c-unknown)}
  .pane .psub{font-size:.72rem;color:var(--ink-2);margin:.3rem 0 .8rem;line-height:1.4;
    text-transform:uppercase;letter-spacing:.06em;font-weight:600}
  .pchips{display:flex;flex-wrap:wrap;gap:6px}
  .pchip{
    font-size:.8rem;font-weight:500;background:#fff;
    border:1px solid rgba(10,22,40,.1);border-radius:6px;padding:.26rem .55rem;color:var(--ink);
  }
  .pchip .tag{font-weight:700;color:var(--ncs-blue);margin-left:.3rem;font-size:.72rem}
  .pane.unknown .pchip{background:rgba(255,255,255,.55);font-size:.74rem;
    color:var(--ink-2);padding:.2rem .48rem;border-color:rgba(10,22,40,.06)}
  .pempty{font-size:.82rem;color:var(--ink-2);font-style:italic;opacity:.78;line-height:1.5}

  .codebox{
    display:flex;align-items:center;gap:14px;flex-wrap:wrap;
    background:var(--ink);border:1px solid var(--ink);
    border-radius:12px;padding:18px 22px;margin:18px 0;
    position:relative;overflow:hidden;
  }
  .codebox::before{
    content:"";position:absolute;top:0;left:0;right:0;height:3px;
    background:linear-gradient(90deg,var(--ncs-blue) 0%,var(--ncs-blue) 30%,transparent 30%,transparent 35%,var(--ncs-blue) 35%,var(--ncs-blue) 45%,transparent 45%);
  }
  .codebox .codelabel{font-size:.72rem;color:rgba(255,255,255,.6);font-weight:700;letter-spacing:.16em;text-transform:uppercase;margin-bottom:4px}
  .codebox .big{font-family:var(--display);font-weight:800;font-size:2rem;
    letter-spacing:.18em;color:#fff;line-height:1}
  .codebox .btn{background:var(--ncs-blue);border-color:var(--ncs-blue);color:#fff;box-shadow:none}
  .codebox .btn:hover{background:#fff;color:var(--ink);border-color:#fff}
  .codebox .btn.ghost{background:transparent;color:#fff;border-color:rgba(255,255,255,.3)}
  .codebox .btn.ghost:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.5);color:#fff}
  .toast{font-size:.85rem;color:var(--ncs-blue);font-weight:600}

  .legend{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:28px}
  @media(max-width:560px){.legend{grid-template-columns:1fr}}
  .legend div{font-size:.86rem;color:var(--ink-2);padding-left:14px;
    border-left:3px solid var(--line);line-height:1.55}
  .legend div b{color:var(--ink);font-weight:700}
  .legend div.a{border-color:var(--c-arena)}
  .legend div.b{border-color:var(--c-blind)}
  .legend div.f{border-color:var(--c-facade)}
  .legend div.u{border-color:var(--c-unknown)}

  .divider{height:1px;background:var(--line);margin:32px 0;border:none}
  footer{margin-top:60px;padding-top:24px;border-top:1px solid var(--line);
    text-align:center;font-size:.78rem;color:var(--ink-3);line-height:1.6}

  /* loading + checkmark */
  .loading{text-align:center;padding:80px 0;color:var(--ink-2);font-family:var(--display);
    font-weight:500;font-size:1.1rem;letter-spacing:-.012em}
  .dots{display:inline-block;margin-left:.4rem}
  .dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--ncs-blue);margin:0 2px;animation:bounce 1.2s ease-in-out infinite}
  .dots span:nth-child(2){animation-delay:.15s}
  .dots span:nth-child(3){animation-delay:.3s}
  @keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.35}40%{transform:translateY(-5px);opacity:1}}

  .check{
    width:64px;height:64px;border-radius:50%;background:var(--ncs-blue);
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 14px 30px -10px rgba(0,167,225,.55);
  }
  .check svg{width:30px;height:30px}

  .err{color:#9a3b2a;font-size:.88rem;font-weight:600;margin-top:8px}
</style>
</head>
<body>
<main id="app"></main>
<script>
(function(){
  "use strict";

  /* ----- 56 traits (sorted), focused on AI-driven workplace qualities ----- */
  var TRAITS = ["Adaptable","Analytical","Anxious","Arrogant","Articulate","Avoidant",
  "Caring","Closed","Collaborative","Complacent","Confident","Controlling","Creative",
  "Curious","Decisive","Detached","Discerning","Disorganized","Distant","Distracted",
  "Driven","Earnest","Empathetic","Ethical","Expressive","Fearful","Flexible","Fragile",
  "Gullible","Hesitant","Humble","Indifferent","Inept","Inflexible","Insular","Inventive",
  "Isolated","Outdated","Overconfident","Passive","Perceptive","Predictable","Proactive",
  "Reactive","Receptive","Reflective","Resilient","Resourceful","Rigid","Savvy","Skilled",
  "Stagnant","Strategic","Stubborn","Unclear","Versatile"];

  var MIN_PICK = 5, MAX_PICK = 6;

  /* ----- storage: cloud (shared) when available, else localStorage ----- */
  var hasCloud = (typeof window.storage === "object" && window.storage &&
                  typeof window.storage.get === "function");
  var Store = {
    get: function(key){
      if(hasCloud){
        return window.storage.get(key,true)
          .then(function(r){ return r ? JSON.parse(r.value) : null; })
          .catch(function(){ return null; });
      }
      return Promise.resolve().then(function(){
        try{ var v=localStorage.getItem(key); return v?JSON.parse(v):null; }
        catch(e){ return null; }
      });
    },
    set: function(key,val){
      var s=JSON.stringify(val);
      if(hasCloud){
        return window.storage.set(key,s,true).then(function(){return true;})
          .catch(function(){return false;});
      }
      return Promise.resolve().then(function(){
        try{ localStorage.setItem(key,s); return true; }catch(e){ return false; }
      });
    },
    list: function(prefix){
      if(hasCloud){
        return window.storage.list(prefix,true)
          .then(function(r){ return (r&&r.keys)||[]; })
          .catch(function(){ return []; });
      }
      return Promise.resolve().then(function(){
        var out=[]; try{
          for(var i=0;i<localStorage.length;i++){
            var k=localStorage.key(i); if(k&&k.indexOf(prefix)===0) out.push(k);
          }
        }catch(e){}
        return out;
      });
    }
  };

  /* ----- helpers ----- */
  var CODE_CHARS="ABCDEFGHJKMNPQRSTUVWXYZ23456789";
  function genCode(){
    var s=""; for(var i=0;i<6;i++) s+=CODE_CHARS[Math.floor(Math.random()*CODE_CHARS.length)];
    return s;
  }
  function genId(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
  function esc(s){ return String(s).replace(/[&<>"]/g,function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]; }); }
  function $(sel,root){ return (root||document).querySelector(sel); }
  function $$(sel,root){ return Array.prototype.slice.call((root||document).querySelectorAll(sel)); }

  /* ----- app state ----- */
  var S = {
    screen:"home",
    name:"", self:[],
    code:null,
    peerCode:"", peerName:"", peerPicks:[],
    session:null, error:""
  };
  var app=document.getElementById("app");

  function go(screen){ S.screen=screen; S.error=""; render(); window.scrollTo(0,0); }

  /* ============ TEMPLATES ============ */
  function topbar(){
    return '<div class="topbar">'+
      '<button class="mark" data-go="home">n-Johari Window</button>'+
      '<span class="byNCS">by NCS</span>'+
    '</div>';
  }

  function tplHome(){
    return topbar()+
    '<div class="stagger">'+
      '<div class="eyebrow">Self-discovery for the AI-driven workplace</div>'+
      '<h1>See yourself as <em>others</em> see you.</h1>'+
      '<p class="lede">The <strong>n-Johari Window</strong> is NCS\u2019 take on the classic Johari Window \u2014 a simple exercise in self-discovery. You choose a few words for how you work, and colleagues choose words for you. The traits focus on qualities that matter most in an <strong>AI-driven workplace</strong>: adaptability, curiosity, ethical judgement, collaboration, and the readiness to keep learning as tools change.</p>'+
      '<div class="choose-grid">'+
        '<button class="choice" data-go="c-name">'+
          '<div class="ic">Step 01</div>'+
          '<strong>Create your window</strong>'+
          '<span>Pick the words that describe you, then get a code to share with your team.</span>'+
        '</button>'+
        '<button class="choice" data-go="a-code">'+
          '<div class="ic">Step 02</div>'+
          '<strong>Answer for someone</strong>'+
          '<span>Have a code from a colleague? Choose the words that describe how they work.</span>'+
        '</button>'+
      '</div>'+
      '<div class="row" style="margin-top:24px"><span class="small">Already shared your code with the team?</span> <button class="linkbtn" data-go="r-code">View your results</button></div>'+
    '</div>'+
    foot();
  }

  function foot(){
    return '<footer>The <strong>n-Johari Window</strong> \u2014 an NCS adaptation of the Johari Window model (Luft &amp; Ingham, 1955) for the AI-driven workplace.'+
      (hasCloud?'':'<br/><em>Offline mode: responses are saved only on this device.</em>')+
      '</footer>';
  }

  function tplCreateName(){
    return topbar()+
    '<div class="stagger">'+
      '<div class="steps">Step <b>1</b> / 3 &nbsp;&middot;&nbsp; Your name</div>'+
      '<h2>First, what should we call you?</h2>'+
      '<p class="small" style="margin-bottom:20px">Your colleagues will see this name when they pick words for you.</p>'+
      '<div class="panel" style="max-width:480px">'+
        '<label class="fld" for="nm">Your name or preferred handle</label>'+
        '<input type="text" id="nm" placeholder="e.g. Jordan Tan" value="'+esc(S.name)+'" maxlength="40" autocomplete="off" />'+
        '<div class="row end" style="margin-top:18px">'+
          '<button class="btn ghost" data-go="home">Back</button>'+
          '<button class="btn" id="toTraits">Continue</button>'+
        '</div>'+
      '</div>'+
    '</div>';
  }

  function tplCreateTraits(){
    return topbar()+
    '<div class="stagger">'+
      '<div class="steps">Step <b>2</b> / 3 &nbsp;&middot;&nbsp; Your traits</div>'+
      '<h2>Choose 5 or 6 words that describe how you work.</h2>'+
      '<p class="small">Be honest rather than modest, '+esc(S.name)+' \u2014 pick the words that feel most true of you at work today.</p>'+
      chipGrid(S.self)+
      selBar("toShare","Continue \u2192")+
    '</div>';
  }

  function tplShare(){
    var link = location.origin+location.pathname+"#a/"+S.code;
    return topbar()+
    '<div class="stagger">'+
      '<div class="steps">Step <b>3</b> / 3 &nbsp;&middot;&nbsp; Share</div>'+
      '<h2>Your window is open.</h2>'+
      '<p class="lede">Share this code with colleagues who know how you work. Each of them opens this page, picks <em>Answer for someone</em>, and enters your code. The more responses, the clearer your window.</p>'+
      '<div class="codebox">'+
        '<div><div class="codelabel">Your code</div><div class="big" id="theCode">'+S.code+'</div></div>'+
        '<button class="btn sm" data-copy="'+S.code+'">Copy code</button>'+
        '<button class="btn sm ghost" data-copy="'+esc(link)+'">Copy link</button>'+
        '<span class="toast" id="copyToast"></span>'+
      '</div>'+
      '<p class="small">Tip: send it to at least 3\u20135 colleagues for a meaningful result.</p>'+
      '<div class="row" style="margin-top:24px">'+
        '<button class="btn" data-results="'+S.code+'">View my window</button>'+
        '<button class="btn ghost" data-go="home">Done</button>'+
      '</div>'+
    '</div>'+foot();
  }

  function tplAnswerCode(){
    return topbar()+
    '<div class="stagger">'+
      '<h2>Answer for a colleague</h2>'+
      '<p class="small" style="margin-bottom:20px">Enter the code they shared with you.</p>'+
      '<div class="panel" style="max-width:460px">'+
        '<label class="fld" for="cd">Their code</label>'+
        '<input type="text" id="cd" class="code" placeholder="ABC234" maxlength="6" value="'+esc(S.peerCode)+'" autocomplete="off" />'+
        (S.error?'<div class="err">'+esc(S.error)+'</div>':'')+
        '<div class="row end" style="margin-top:18px">'+
          '<button class="btn ghost" data-go="home">Back</button>'+
          '<button class="btn" id="findSession">Continue</button>'+
        '</div>'+
      '</div>'+
    '</div>';
  }

  function tplAnswerTraits(){
    var who = S.session && S.session.name ? S.session.name : "this colleague";
    return topbar()+
    '<div class="stagger">'+
      '<h2>Which words describe '+esc(who)+'?</h2>'+
      '<p class="small">Choose 5 or 6 words. Pick what you genuinely see in them at work \u2014 your honest view is the gift.</p>'+
      '<div class="panel" style="max-width:480px;margin-top:14px">'+
        '<label class="fld" for="pn">Your name <span style="font-weight:400;color:var(--ink-3)">(optional)</span></label>'+
        '<input type="text" id="pn" placeholder="Anonymous" value="'+esc(S.peerName)+'" maxlength="40" autocomplete="off" />'+
      '</div>'+
      chipGrid(S.peerPicks)+
      selBar("submitAnswer","Submit \u2192")+
    '</div>';
  }

  function tplAnswerDone(){
    var who = S.session && S.session.name ? S.session.name : "them";
    return topbar()+
    '<div class="stagger" style="text-align:center;padding-top:30px">'+
      '<div class="check"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5 12.5l4.5 4.5L19 7.5" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg></div>'+
      '<h2 style="margin-top:1rem">Thank you.</h2>'+
      '<p class="lede" style="margin:0 auto">Your answers have been added to '+esc(who)+'\u2019s window. They\u2019ll see how your view compares with their own \u2014 and with everyone else\u2019s.</p>'+
      '<div class="row" style="justify-content:center;margin-top:28px">'+
        '<button class="btn ghost" data-go="home">Back to start</button>'+
        '<button class="btn" data-go="c-name">Create my own window</button>'+
      '</div>'+
    '</div>'+foot();
  }

  function tplResultsCode(){
    return topbar()+
    '<div class="stagger">'+
      '<h2>View a window</h2>'+
      '<p class="small" style="margin-bottom:20px">Enter your code to see how your window has filled in.</p>'+
      '<div class="panel" style="max-width:460px">'+
        '<label class="fld" for="rcd">Your code</label>'+
        '<input type="text" id="rcd" class="code" placeholder="ABC234" maxlength="6" value="'+esc(S.peerCode)+'" autocomplete="off" />'+
        (S.error?'<div class="err">'+esc(S.error)+'</div>':'')+
        '<div class="row end" style="margin-top:18px">'+
          '<button class="btn ghost" data-go="home">Back</button>'+
          '<button class="btn" id="loadResults">Open window</button>'+
        '</div>'+
      '</div>'+
    '</div>';
  }

  /* ----- shared bits ----- */
  function chipGrid(selected){
    var set={}; selected.forEach(function(t){set[t]=1;});
    var html='<div class="chipwrap">';
    TRAITS.forEach(function(t){
      html+='<button class="chip'+(set[t]?' on':'')+'" data-trait="'+t+'">'+t+'</button>';
    });
    return html+'</div>';
  }
  function selBar(actionId,label){
    return '<div class="selbar" id="selbar">'+
      '<div class="count"><b id="cnt">0</b> / '+MAX_PICK+' chosen <span id="hint" class="hint"></span></div>'+
      '<button class="btn" id="'+actionId+'" disabled>'+label+'</button>'+
    '</div>';
  }

  /* ----- window rendering ----- */
  function computeWindow(session){
    var responses = session.responses || [];
    var self={}; (session.self||[]).forEach(function(t){self[t]=1;});
    var tally={}; TRAITS.forEach(function(t){tally[t]=0;});
    responses.forEach(function(r){
      (r.traits||[]).forEach(function(t){ if(tally.hasOwnProperty(t)) tally[t]++; });
    });
    var arena=[],blind=[],facade=[],unknown=[];
    TRAITS.forEach(function(t){
      var mine=!!self[t], theirs=tally[t]>0;
      if(mine&&theirs) arena.push(t);
      else if(!mine&&theirs) blind.push(t);
      else if(mine&&!theirs) facade.push(t);
      else unknown.push(t);
    });
    function byTally(a,b){ return tally[b]-tally[a]; }
    arena.sort(byTally); blind.sort(byTally);
    return {arena:arena,blind:blind,facade:facade,unknown:unknown,
            tally:tally,n:responses.length};
  }

  function paneHTML(cls,name,sub,traits,tally,showTag,emptyMsg){
    var chips="";
    if(traits.length===0){
      chips='<div class="pempty">'+emptyMsg+'</div>';
    }else{
      chips='<div class="pchips">';
      traits.forEach(function(t){
        var tag = (showTag && tally[t]>1) ? '<span class="tag">'+tally[t]+'</span>' : "";
        chips+='<span class="pchip">'+t+tag+'</span>';
      });
      chips+='</div>';
    }
    return '<div class="pane '+cls+'">'+
      '<div class="pname">'+name+'</div>'+
      '<div class="psub">'+sub+'</div>'+chips+'</div>';
  }

  function tplResults(){
    var s=S.session, w=computeWindow(s);
    var link = location.origin+location.pathname+"#a/"+s.code;
    var nText = w.n===0 ? "No responses yet" :
                w.n+" response"+(w.n===1?"":"s")+" so far";
    return topbar()+
    '<div class="screen">'+
      '<div class="eyebrow">'+esc(s.name||"Your")+'\u2019s window</div>'+
      '<h2 style="margin-top:.4rem">The four rooms of the working self.</h2>'+
      '<p class="small">Built from your own '+(s.self?s.self.length:0)+' words and the answers of your colleagues. <b>'+nText+'.</b></p>'+
      (w.n===0
        ? '<div class="codebox"><div><div class="codelabel">Share your code to gather answers</div><div class="big">'+s.code+'</div></div>'+
          '<button class="btn sm" data-copy="'+s.code+'">Copy code</button>'+
          '<button class="btn sm ghost" data-copy="'+esc(link)+'">Copy link</button>'+
          '<span class="toast" id="copyToast"></span></div>'
        : '')+
      '<div class="winstage">'+
        '<div class="axis-top"><div>Known to others</div><div>Not known to others</div></div>'+
        '<div class="winrow">'+
          '<div class="axis-left"><div>Known to self</div><div>Not known to self</div></div>'+
          '<div class="window">'+
            paneHTML("arena","Open","What you and others both see",w.arena,w.tally,true,
                     "Nothing here yet \u2014 it appears once a response matches one of your words.")+
            paneHTML("blind","Blind Spot","Seen by others, not by you",w.blind,w.tally,true,
                     "No blind spots surfaced yet.")+
            paneHTML("facade","Fa\u00e7ade","Known to you, kept from others",w.facade,w.tally,false,
                     "You\u2019ve kept nothing hidden \u2014 every word you chose was echoed back.")+
            paneHTML("unknown","Unknown","Not yet seen by anyone",w.unknown,w.tally,false,
                     "Remarkable \u2014 every word has found a room.")+
          '</div>'+
        '</div>'+
      '</div>'+
      '<div class="legend">'+
        '<div class="a"><b>Open.</b> Common ground \u2014 the working self that\u2019s freely shared and recognised by all.</div>'+
        '<div class="b"><b>Blind Spot.</b> Strengths and habits others notice that you may not. Feedback shrinks it.</div>'+
        '<div class="f"><b>Fa\u00e7ade.</b> What you know of yourself but haven\u2019t revealed. Openness shrinks it.</div>'+
        '<div class="u"><b>Unknown.</b> Potential not yet seen by anyone \u2014 it shrinks as more colleagues respond.</div>'+
      '</div>'+
      '<hr class="divider" />'+
      '<div class="row">'+
        '<button class="btn" data-results="'+s.code+'">Refresh window</button>'+
        '<button class="btn ghost" data-copy="'+s.code+'">Copy code to share</button>'+
        '<button class="btn ghost" data-go="home">Home</button>'+
        '<span class="toast" id="copyToast"></span>'+
      '</div>'+
    '</div>'+foot();
  }

  function tplLoading(msg){
    return topbar()+'<div class="loading">'+(msg||"Opening the window")+
      '<span class="dots"><span></span><span></span><span></span></span></div>';
  }

  /* ============ RENDER + BIND ============ */
  function render(){
    var html;
    switch(S.screen){
      case "home": html=tplHome(); break;
      case "c-name": html=tplCreateName(); break;
      case "c-traits": html=tplCreateTraits(); break;
      case "c-share": html=tplShare(); break;
      case "a-code": html=tplAnswerCode(); break;
      case "a-traits": html=tplAnswerTraits(); break;
      case "a-done": html=tplAnswerDone(); break;
      case "r-code": html=tplResultsCode(); break;
      case "results": html=tplResults(); break;
      case "loading": html=tplLoading(S._loadMsg); break;
      default: html=tplHome();
    }
    app.innerHTML=html;
    bind();
  }

  function bind(){
    $$("[data-go]").forEach(function(b){
      b.addEventListener("click",function(){ go(b.getAttribute("data-go")); });
    });
    $$("[data-copy]").forEach(function(b){
      b.addEventListener("click",function(){ doCopy(b.getAttribute("data-copy")); });
    });
    $$("[data-results]").forEach(function(b){
      b.addEventListener("click",function(){ openResults(b.getAttribute("data-results")); });
    });

    if(S.screen==="c-name") bindCreateName();
    if(S.screen==="c-traits") bindTraits(S.self,"toShare",onCreateTraitsDone);
    if(S.screen==="a-code") bindAnswerCode();
    if(S.screen==="a-traits") bindTraits(S.peerPicks,"submitAnswer",onSubmitAnswer);
    if(S.screen==="r-code") bindResultsCode();
  }

  function bindCreateName(){
    var input=$("#nm");
    function next(){
      var v=input.value.trim();
      if(!v){ input.focus(); input.style.borderColor="#9a3b2a"; return; }
      S.name=v; go("c-traits");
    }
    $("#toTraits").addEventListener("click",next);
    input.addEventListener("keydown",function(e){ if(e.key==="Enter") next(); });
    input.focus();
  }

  function bindTraits(target,actionId,onDone){
    var bar=$("#selbar"), cntEl=$("#cnt"), hintEl=$("#hint"), actBtn=$("#"+actionId);
    function refresh(){
      cntEl.textContent=target.length;
      var ok = target.length>=MIN_PICK && target.length<=MAX_PICK;
      actBtn.disabled=!ok;
      if(target.length<MIN_PICK){
        hintEl.textContent="\u2014 pick "+(MIN_PICK-target.length)+" more";
      }else{ hintEl.textContent="\u2014 looks good"; }
      $$(".chip").forEach(function(c){
        var on=c.classList.contains("on");
        c.disabled = (!on && target.length>=MAX_PICK);
      });
    }
    $$(".chip").forEach(function(c){
      c.addEventListener("click",function(){
        var t=c.getAttribute("data-trait");
        var i=target.indexOf(t);
        if(i>-1){ target.splice(i,1); c.classList.remove("on"); }
        else{
          if(target.length>=MAX_PICK){
            bar.classList.remove("flash"); void bar.offsetWidth; bar.classList.add("flash");
            return;
          }
          target.push(t); c.classList.add("on");
        }
        refresh();
      });
    });
    actBtn.addEventListener("click",function(){
      if(target.length>=MIN_PICK && target.length<=MAX_PICK) onDone();
    });
    refresh();
  }

  function onCreateTraitsDone(){
    S._loadMsg="Opening your window"; go("loading");
    var code=genCode();
    Store.get("johari:"+code).then(function(existing){
      if(existing) code=genCode();
      S.code=code;
      var session={code:code,name:S.name,self:S.self.slice(),createdAt:Date.now()};
      return Store.set("johari:"+code,session);
    }).then(function(){
      go("c-share");
    });
  }

  function bindAnswerCode(){
    var input=$("#cd");
    input.addEventListener("input",function(){
      input.value=input.value.toUpperCase().replace(/[^A-Z0-9]/g,"");
    });
    function find(){
      var code=input.value.trim().toUpperCase();
      if(code.length<6){ S.error="Codes are 6 characters long."; render(); return; }
      S.peerCode=code;
      S._loadMsg="Finding the window"; go("loading");
      loadSession(code).then(function(sess){
        if(!sess){ S.peerCode=code; S.error="No window found with that code. Check the spelling and try again."; go("a-code"); return; }
        S.session=sess; S.peerPicks=[]; go("a-traits");
      });
    }
    $("#findSession").addEventListener("click",find);
    input.addEventListener("keydown",function(e){ if(e.key==="Enter") find(); });
    input.focus();
  }

  function bindResultsCode(){
    var input=$("#rcd");
    input.addEventListener("input",function(){
      input.value=input.value.toUpperCase().replace(/[^A-Z0-9]/g,"");
    });
    function load(){
      var code=input.value.trim().toUpperCase();
      if(code.length<6){ S.error="Codes are 6 characters long."; render(); return; }
      openResults(code);
    }
    $("#loadResults").addEventListener("click",load);
    input.addEventListener("keydown",function(e){ if(e.key==="Enter") load(); });
    input.focus();
  }

  function onSubmitAnswer(){
    var pn=$("#pn"); var name = pn ? pn.value.trim() : "";
    S.peerName=name;
    S._loadMsg="Adding your answers"; go("loading");
    var rid=genId();
    var resp={id:rid,name:name||"Anonymous",traits:S.peerPicks.slice(),at:Date.now()};
    Store.set("johari:"+S.session.code+":r:"+rid,resp).then(function(){
      go("a-done");
    });
  }

  function loadSession(code){
    return Store.get("johari:"+code).then(function(main){
      if(!main) return null;
      return Store.list("johari:"+code+":r:").then(function(keys){
        if(!keys.length){ main.responses=[]; return main; }
        return Promise.all(keys.map(function(k){ return Store.get(k); }))
          .then(function(rows){
            main.responses=rows.filter(Boolean);
            return main;
          });
      });
    });
  }

  function openResults(code){
    S._loadMsg="Opening the window"; go("loading");
    loadSession(code).then(function(sess){
      if(!sess){
        S.peerCode=code;
        S.error="No window found with that code.";
        go("r-code"); return;
      }
      S.session=sess; S.code=code; go("results");
    });
  }

  function doCopy(text){
    function flash(){
      var t=$("#copyToast"); if(t){ t.textContent="Copied!"; setTimeout(function(){ if(t) t.textContent=""; },1800); }
    }
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(flash,fallback);
    }else{ fallback(); }
    function fallback(){
      var ta=document.createElement("textarea");
      ta.value=text; ta.style.position="fixed"; ta.style.opacity="0";
      document.body.appendChild(ta); ta.select();
      try{ document.execCommand("copy"); flash(); }catch(e){}
      document.body.removeChild(ta);
    }
  }

  function start(){
    var h=(location.hash||"").replace(/^#/,"");
    var m=h.match(/^([ar])\/([A-Za-z0-9]{6})$/);
    if(m){
      var code=m[2].toUpperCase();
      if(m[1]==="a"){ S.peerCode=code; go("a-code"); }
      else{ openResults(code); }
      return;
    }
    render();
  }

  start();
})();
</script>
</body>
</html>
